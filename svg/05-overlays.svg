<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 1100">
<style>
.st{font-family:Inter;font-size:20px;font-weight:600;fill:#374151}
.desc{font-family:Inter;font-size:11px;font-weight:400;fill:#9CA3AF}
.sl{font-family:Inter;font-size:11px;font-weight:400;fill:#9CA3AF}
</style>
<defs>
<filter id="shadow-modal" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgb(0,0,0)" flood-opacity="0.15"/></filter>
<filter id="shadow-dropdown" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgb(0,0,0)" flood-opacity="0.15"/></filter>
</defs>

<!-- ============================================================ -->
<!-- STEP 17 — Modal                                               -->
<!-- ============================================================ -->
<g id="step-17-modal" transform="translate(100,60)">
<text class="st" y="20">Step 17 — Modal</text>
<text class="desc" y="40">overlay: rgba(0,0,0,0.5) · dialog: #FFF · radius: 12px · padding: 24px · shadow-modal · max-width: 400px</text>

<!-- Viewport frame showing modal open -->
<g transform="translate(0,60)">
<!-- Page background -->
<rect width="500" height="360" fill="#f8fafc" stroke="#E3E8EF" stroke-width="1"/>
<!-- Fake page content behind overlay -->
<rect x="30" y="30" width="200" height="10" rx="4" fill="#E3E8EF"/>
<rect x="30" y="50" width="160" height="10" rx="4" fill="#E3E8EF"/>
<rect x="30" y="70" width="180" height="10" rx="4" fill="#E3E8EF"/>
<rect x="30" y="100" width="220" height="10" rx="4" fill="#E3E8EF"/>
<rect x="30" y="120" width="140" height="10" rx="4" fill="#E3E8EF"/>

<!-- Overlay: rgba(0,0,0,0.5) -->
<rect width="500" height="360" fill="#000000" opacity="0.5"/>

<!-- Dialog centered (overlay has padding-bottom: 48px, shifts dialog up) -->
<!-- Centering: available height = 360-48 = 312, dialog height = 192, y = (312-192)/2 = 60 -->
<g transform="translate(60,60)">
<rect width="380" height="192" rx="12" fill="#FFFFFF" filter="url(#shadow-modal)"/>

<!-- Title: text-h3 = 24px 600, color #374151, margin 0 0 16px -->
<text font-family="Inter" font-size="24" font-weight="600" fill="#374151" x="24" y="42">Move to Project</text>

<!-- Content: 16px 400, color #6B7280 -->
<!-- y=84: title bottom (24+32=56) + margin 16 + baseline 12 = 84 -->
<text font-family="Inter" font-size="16" font-weight="400" fill="#6B7280" x="24" y="84">Select a project to move this</text>
<text font-family="Inter" font-size="16" font-weight="400" fill="#6B7280" x="24" y="108">action to.</text>

<!-- Actions: justify-content flex-end, gap 8px, margin-top 20px -->
<!-- y=140: content bottom (72+48=120) + margin 20 = 140 -->
<!-- Cancel button (ghost sm): padding 6px 12px, 14px 600 -->
<g transform="translate(206,140)">
<rect width="76" height="28" rx="6" fill="#ecf3fc" stroke="#c6daf6" stroke-width="1"/>
<text font-family="Inter" font-size="14" font-weight="600" fill="#356dc0" text-anchor="middle" x="38" y="19">Cancel</text>
</g>
<!-- Move button (primary sm) -->
<g transform="translate(290,140)">
<rect width="66" height="28" rx="6" fill="#4185DE"/>
<text font-family="Inter" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle" x="33" y="19">Move</text>
</g>
</g>
</g>
</g>

<!-- ============================================================ -->
<!-- STEP 18 — ConfirmDialog                                       -->
<!-- ============================================================ -->
<g id="step-18-confirm-dialog" transform="translate(700,60)">
<text class="st" y="20">Step 18 — ConfirmDialog</text>
<text class="desc" y="40">title: 18px 600 · message: 16px 400 #6B7280 lh 1.5 · radius: 8px · padding: 24px · shadow-dropdown · gap: 10px</text>

<!-- Viewport frame showing confirm dialog -->
<g transform="translate(0,60)">
<!-- Page background -->
<rect width="480" height="280" fill="#f8fafc" stroke="#E3E8EF" stroke-width="1"/>
<rect x="30" y="30" width="180" height="10" rx="4" fill="#E3E8EF"/>
<rect x="30" y="50" width="140" height="10" rx="4" fill="#E3E8EF"/>
<rect x="30" y="80" width="200" height="10" rx="4" fill="#E3E8EF"/>

<!-- Overlay: rgba(0,0,0,0.5) -->
<rect width="480" height="280" fill="#000000" opacity="0.5"/>

<!-- Dialog centered -->
<!-- Centering: available height = 280-48 = 232, dialog height = 178, y = (232-178)/2 = 27 -->
<g transform="translate(60,27)">
<rect width="360" height="178" rx="8" fill="#FFFFFF" filter="url(#shadow-dropdown)"/>

<!-- Title: text-body-l fw-semibold = 18px 600, margin 0 0 12px, color #374151 -->
<text font-family="Inter" font-size="18" font-weight="600" fill="#374151" x="24" y="38">Delete Item</text>

<!-- Message: text-body-m = 16px 400, color #6B7280, line-height 1.5, margin 0 0 20px -->
<!-- y=70: title bottom (24+22=46) + margin 12 + baseline 12 = 70 -->
<text font-family="Inter" font-size="16" font-weight="400" fill="#6B7280" x="24" y="70">Are you sure you want to delete</text>
<text font-family="Inter" font-size="16" font-weight="400" fill="#6B7280" x="24" y="94">this item? This cannot be undone.</text>

<!-- Actions: justify-content flex-end, gap 10px -->
<!-- y=126: message bottom (58+48=106) + margin 20 = 126 -->
<!-- Cancel button (ghost sm) -->
<g transform="translate(174,126)">
<rect width="76" height="28" rx="6" fill="#ecf3fc" stroke="#c6daf6" stroke-width="1"/>
<text font-family="Inter" font-size="14" font-weight="600" fill="#356dc0" text-anchor="middle" x="38" y="19">Cancel</text>
</g>
<!-- Delete button (danger sm): font-weight 700 -->
<g transform="translate(260,126)">
<rect width="76" height="28" rx="6" fill="#ef4444"/>
<text font-family="Inter" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" x="38" y="19">Delete</text>
</g>
</g>
</g>
</g>

<!-- ============================================================ -->
<!-- STEP 19 — Dropdown                                            -->
<!-- ============================================================ -->
<g id="step-19-dropdown" transform="translate(1280,60)">
<text class="st" y="20">Step 19 — Dropdown</text>
<text class="desc" y="40">menu: #FFF · border: 1px #E3E8EF · radius: 8px · shadow-dropdown · padding: 8px · items: 16px</text>

<!-- Trigger button (ghost md) -->
<g transform="translate(0,60)">
<rect width="110" height="36" rx="6" fill="#ecf3fc" stroke="#c6daf6" stroke-width="1"/>
<text font-family="Inter" font-size="14" font-weight="600" fill="#356dc0" text-anchor="middle" x="55" y="23">Actions ▾</text>
</g>

<!-- Dropdown menu (2px below trigger) -->
<g transform="translate(0,98)">
<rect width="200" height="130" rx="8" fill="#FFFFFF" stroke="#E3E8EF" stroke-width="1" filter="url(#shadow-dropdown)"/>

<!-- Item 1: SettingsIcon + "Settings", hover state -->
<g transform="translate(8,8)">
<!-- Hover background: #F3F4F6 -->
<rect x="-4" y="-4" width="192" height="40" rx="4" fill="#F3F4F6"/>
<!-- SettingsIcon: 32×32 box with 5px padding = 22×22 visible, vertically centered in 32px -->
<g transform="translate(4,0)">
<g transform="translate(5,5) scale(0.22917)">
<path fill="#4185DE" d="M35.96 91.78L34.21 77.77C33.26 77.41 32.37 76.97 31.53 76.46C30.69 75.95 29.87 75.4 29.06 74.82L16.04 80.29L4 59.49L15.27 50.96C15.2 50.44 15.16 49.95 15.16 49.48L15.16 46.52C15.16 46.05 15.2 45.56 15.27 45.04L4 36.51L16.04 15.71L29.06 21.18C29.87 20.6 30.71 20.05 31.58 19.54C32.46 19.03 33.33 18.59 34.21 18.23L35.96 4.22L60.04 4.22L61.79 18.23C62.74 18.59 63.63 19.03 64.47 19.54C65.31 20.05 66.13 20.6 66.94 21.18L79.96 15.71L92 36.51L80.73 45.04C80.8 45.56 80.84 46.05 80.84 46.52L80.84 49.48C80.84 49.95 80.76 50.44 80.62 50.96L91.89 59.49L79.85 80.29L66.94 74.82C66.13 75.4 65.29 75.95 64.42 76.46C63.54 76.97 62.67 77.41 61.79 77.77L60.04 91.78L35.96 91.78ZM43.62 83.02L52.27 83.02L53.8 71.42C56.06 70.84 58.16 69.98 60.09 68.85C62.03 67.72 63.8 66.35 65.4 64.75L76.24 69.23L80.51 61.79L71.09 54.68C71.46 53.66 71.71 52.58 71.86 51.45C72.01 50.32 72.08 49.17 72.08 48C72.08 46.83 72.01 45.68 71.86 44.55C71.71 43.42 71.46 42.34 71.09 41.32L80.51 34.21L76.24 26.77L65.4 31.36C63.8 29.69 62.03 28.28 60.09 27.15C58.16 26.02 56.06 25.16 53.8 24.58L52.38 12.98L43.73 12.98L42.2 24.58C39.94 25.16 37.84 26.02 35.91 27.15C33.97 28.28 32.2 29.65 30.6 31.25L19.76 26.77L15.49 34.21L24.91 41.21C24.54 42.31 24.29 43.4 24.14 44.5C23.99 45.59 23.92 46.76 23.92 48C23.92 49.17 23.99 50.3 24.14 51.39C24.29 52.49 24.54 53.58 24.91 54.68L15.49 61.79L19.76 69.23L30.6 64.64C32.2 66.31 33.97 67.72 35.91 68.85C37.84 69.98 39.94 70.84 42.2 71.42L43.62 83.02ZM48.22 63.32C52.45 63.32 56.06 61.83 59.05 58.84C62.05 55.84 63.54 52.23 63.54 48C63.54 43.77 62.05 40.16 59.05 37.16C56.06 34.17 52.45 32.68 48.22 32.68C43.91 32.68 40.28 34.17 37.33 37.16C34.37 40.16 32.9 43.77 32.9 48C32.9 52.23 34.37 55.84 37.33 58.84C40.28 61.83 43.91 63.32 48.22 63.32Z"/>
</g>
</g>
<!-- Text "Settings" vertically centered in 32px: baseline at ~22 -->
<text font-family="Inter" font-size="16" font-weight="400" fill="#374151" x="40" y="22">Settings</text>
</g>
<text class="sl" x="206" y="26">hover</text>

<!-- Item 2: text only, no icon -->
<g transform="translate(8,48)">
<text font-family="Inter" font-size="16" font-weight="400" fill="#374151" x="12" y="20">Move to Project</text>
</g>

<!-- Separator line -->
<line x1="8" y1="80" x2="192" y2="80" stroke="#E3E8EF" stroke-width="1"/>

<!-- Item 3: danger with TrashIcon -->
<g transform="translate(8,84)">
<!-- TrashIcon: 32×32 box with 5px padding = 22×22 visible -->
<g transform="translate(4,0)">
<g transform="translate(5,5) scale(0.22917)">
<path fill="#dc2626" d="M22.53 92C20.67 92 19.05 91.31 17.66 89.92C16.27 88.53 15.58 86.91 15.58 85.05L15.58 17.89L10.95 17.89L10.95 8.63L34.11 8.63L34.11 4L61.89 4L61.89 8.63L85.05 8.63L85.05 17.89L80.42 17.89L80.42 85.05C80.42 86.91 79.73 88.53 78.34 89.92C76.95 91.31 75.33 92 73.47 92L22.53 92ZM71.16 17.89L24.84 17.89L24.84 82.74L71.16 82.74L71.16 17.89ZM34.11 73.47L43.37 73.47L43.37 27.16L34.11 27.16L34.11 73.47ZM52.63 73.47L61.89 73.47L61.89 27.16L52.63 27.16L52.63 73.47Z"/>
</g>
</g>
<!-- Text "Delete" danger color -->
<text font-family="Inter" font-size="16" font-weight="400" fill="#dc2626" x="40" y="22">Delete</text>
</g>
<text class="sl" x="206" y="110">danger</text>
</g>
</g>

<!-- ============================================================ -->
<!-- STEP 20 — ErrorToaster                                        -->
<!-- ============================================================ -->
<g id="step-20-error-toaster" transform="translate(100,680)">
<text class="st" y="20">Step 20 — ErrorToaster</text>
<text class="desc" y="40">padding: 8px 12px · radius: 6px · text-body-s (14px 400) · margin-bottom: 10px · centered</text>

<!-- Error toast: bg #fecaca, color #7f1c1d -->
<g transform="translate(30,60)">
<rect width="180" height="30" rx="6" fill="#fecaca"/>
<text font-family="Inter" font-size="14" font-weight="400" fill="#7f1c1d" text-anchor="middle" x="90" y="20">Something went wrong</text>
</g>
<text class="sl" x="220" y="80">error</text>

<!-- Success toast: bg #d1fae5, color #065f46 (10px margin-bottom gap) -->
<g transform="translate(8,100)">
<rect width="240" height="30" rx="6" fill="#d1fae5"/>
<text font-family="Inter" font-size="14" font-weight="400" fill="#065f46" text-anchor="middle" x="120" y="20">Item completed successfully</text>
</g>
<text class="sl" x="258" y="120">success</text>
</g>

<!-- ============================================================ -->
<!-- STEP 21 — QuickAddBtn                                         -->
<!-- ============================================================ -->
<g id="step-21-quick-add-btn" transform="translate(460,680)">
<text class="st" y="20">Step 21 — QuickAddBtn</text>
<text class="desc" y="40">padding: 8px 16px · radius: 6px · border: 1px #E3E8EF · bg: #ecf3fc · min-width: 200px · text-body-s (14px)</text>

<!-- Collapsed state: button with "+" icon (16px) + "Quick Add" label (14px), gap 8px -->
<g transform="translate(0,60)">
<rect width="200" height="32" rx="6" fill="#ecf3fc" stroke="#E3E8EF" stroke-width="1"/>
<!-- "+" icon: font-size 16px, weight 400, color #356dc0 -->
<text font-family="Inter" font-size="16" font-weight="400" fill="#356dc0" x="16" y="21">+</text>
<!-- "Quick Add" label: font-size 14px, color #356dc0 -->
<text font-family="Inter" font-size="14" font-weight="400" fill="#356dc0" x="34" y="21">Quick Add</text>
</g>
<text class="sl" x="0" y="108">Collapsed</text>

<!-- Expanded state (default): input with placeholder text -->
<g transform="translate(230,60)">
<rect width="200" height="32" rx="6" fill="#ecf3fc" stroke="#E3E8EF" stroke-width="1"/>
<!-- Placeholder: "Add new stuff", color #D1D5DB -->
<text font-family="Inter" font-size="14" font-weight="400" fill="#D1D5DB" x="16" y="21">Add new stuff</text>
</g>
<text class="sl" x="230" y="108">Expanded</text>

<!-- Expanded state (focused): border-color #4185DE -->
<g transform="translate(460,60)">
<rect width="200" height="32" rx="6" fill="#ecf3fc" stroke="#4185DE" stroke-width="1"/>
<text font-family="Inter" font-size="14" font-weight="400" fill="#D1D5DB" x="16" y="21">Add new stuff</text>
</g>
<text class="sl" x="460" y="108">Focused</text>
</g>

<!-- ============================================================ -->
<!-- STEP 22 — TagFilter                                           -->
<!-- ============================================================ -->
<g id="step-22-tag-filter" transform="translate(1200,680)">
<text class="st" y="20">Step 22 — TagFilter</text>
<text class="desc" y="40">icon btn: padding 4px 6px · chips: radius 12px padding 2px 8px · context: #4185DE bg · menu: min-width 180px</text>

<!-- Filter row: inline-flex, gap 6px, flex-wrap -->
<g transform="translate(0,60)">

<!-- Filter icon button (Btn variant="icon": transparent bg, color #4185DE, padding 4px 6px, radius 6px) -->
<g transform="translate(0,0)">
<rect width="32" height="28" rx="6" fill="transparent"/>
<!-- FilterIcon: 20×20 with 2px padding = 16×16 visible, centered in 32×28 button -->
<g transform="translate(8,6) scale(0.16667)">
<rect x="4" y="15" width="88" height="11" rx="5.5" fill="#4185DE"/>
<rect x="15" y="42.5" width="66" height="11" rx="5.5" fill="#4185DE"/>
<rect x="31.5" y="70" width="33" height="11" rx="5.5" fill="#4185DE"/>
</g>
</g>

<!-- Context chip "@work": bg #4185DE, border-color #4185DE, color #FFF -->
<g transform="translate(38,4)">
<rect width="56" height="20" rx="12" fill="#4185DE"/>
<text font-family="Inter" font-size="14" font-weight="400" fill="#FFFFFF" x="8" y="15">@work</text>
</g>

<!-- Regular chip "@calls": bg #F3F4F6, border 1px #E3E8EF, color #374151 -->
<g transform="translate(100,4)">
<rect width="76" height="20" rx="12" fill="#F3F4F6" stroke="#E3E8EF" stroke-width="1"/>
<text font-family="Inter" font-size="14" font-weight="400" fill="#374151" x="8" y="15">@calls</text>
<!-- Remove button: ×, color #9CA3AF, margin-left 2px -->
<text font-family="Inter" font-size="14" font-weight="400" fill="#9CA3AF" x="60" y="15">×</text>
</g>

<!-- Regular chip "@home" -->
<g transform="translate(182,4)">
<rect width="72" height="20" rx="12" fill="#F3F4F6" stroke="#E3E8EF" stroke-width="1"/>
<text font-family="Inter" font-size="14" font-weight="400" fill="#374151" x="8" y="15">@home</text>
<text font-family="Inter" font-size="14" font-weight="400" fill="#9CA3AF" x="56" y="15">×</text>
</g>
</g>

<!-- Dropdown menu (open, below filter button, aligned right) -->
<g transform="translate(0,92)">
<rect width="200" height="212" rx="8" fill="#FFFFFF" stroke="#E3E8EF" stroke-width="1" filter="url(#shadow-dropdown)"/>

<!-- Item 1: @work (context tag, disabled, opacity 0.5) -->
<g opacity="0.5">
<g transform="translate(20,8)">
<!-- Check: 18px wide, text-anchor middle, color #4185DE, weight 600 -->
<text font-family="Inter" font-size="16" font-weight="600" fill="#4185DE" text-anchor="middle" x="9" y="20">✓</text>
<!-- Label: 16px 400, color #374151, after check (18px) + gap (8px) -->
<text font-family="Inter" font-size="16" font-weight="400" fill="#374151" x="26" y="20">@work</text>
</g>
</g>

<!-- Item 2: @calls (selected) -->
<g transform="translate(20,40)">
<text font-family="Inter" font-size="16" font-weight="600" fill="#4185DE" text-anchor="middle" x="9" y="20">✓</text>
<text font-family="Inter" font-size="16" font-weight="400" fill="#374151" x="26" y="20">@calls</text>
</g>

<!-- Item 3: @home (not selected) -->
<g transform="translate(20,72)">
<text font-family="Inter" font-size="16" font-weight="600" fill="#4185DE" text-anchor="middle" x="9" y="20"></text>
<text font-family="Inter" font-size="16" font-weight="400" fill="#374151" x="26" y="20">@home</text>
</g>

<!-- Item 4: @errands (selected) -->
<g transform="translate(20,104)">
<text font-family="Inter" font-size="16" font-weight="600" fill="#4185DE" text-anchor="middle" x="9" y="20">✓</text>
<text font-family="Inter" font-size="16" font-weight="400" fill="#374151" x="26" y="20">@errands</text>
</g>

<!-- Item 5: @phone (not selected) -->
<g transform="translate(20,136)">
<text font-family="Inter" font-size="16" font-weight="600" fill="#4185DE" text-anchor="middle" x="9" y="20"></text>
<text font-family="Inter" font-size="16" font-weight="400" fill="#374151" x="26" y="20">@phone</text>
</g>

<!-- Clear all: border-top 1px #E3E8EF, margin-top 4px, text-body-s 14px, color #9CA3AF -->
<line x1="8" y1="172" x2="192" y2="172" stroke="#E3E8EF" stroke-width="1"/>
<text font-family="Inter" font-size="14" font-weight="400" fill="#9CA3AF" text-anchor="middle" x="100" y="193">Clear all</text>
</g>
</g>

</svg>
